<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جزئیات محصول | المنتال</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #productContainer {
            display: flex; gap: 50px; flex-wrap: wrap;
            max-width: 900px; margin: 60px auto; padding: 40px;
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        .prod-img-side { flex: 1; min-width: 300px; }
        .prod-img-side img { width: 100%; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .prod-info-side { flex: 1; min-width: 300px; display: flex; flex-direction: column; justify-content: center; gap: 20px; position: relative; }
        .single-price { font-size: 26px; font-weight: 900; color: #ff1493; }
        .desc { color: #4a5568; line-height: 1.8; font-size: 16px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">Elemental</div>
        <nav class="nav">
            <a href="index.html">خانه</a>
            <a href="products.html">محصولات</a>
        </nav>
        <div class="header-icons">
            <button class="cart-btn">🛒</button>
        </div>
    </header>

    <main style="padding: 0 20px;">
        <div id="productContainer"></div>
    </main>

    <aside id="cartPanel" class="cart-panel">
        <div class="cart-header">
            <h2>سبد خرید شما</h2>
            <button class="close-cart">×</button>
        </div>
        
        <div id="cartMainSection">
            <div id="cartItems"></div>
            <div class="cart-footer">
                <div class="total">مجموع: <span id="totalPrice">0</span> تومان</div>
                <button class="checkout-btn" onclick="showCheckoutForm()">💳 رفتن به مرحله پرداخت</button>
            </div>
        </div>

        <div id="checkoutFormSection" style="display: none; padding: 25px; color: #2c3e50;">
            <h3 style="margin-bottom: 20px; color: #ff007f;">📋 مشخصات تحویل‌گیرنده</h3>
            <div style="display:flex; flex-direction:column; gap:15px;">
                <input type="text" id="customerName" placeholder="نام و نام خانوادگی">
                <input type="tel" id="customerPhone" placeholder="شماره موبایل">
                <textarea id="customerAddress" placeholder="آدرس دقیق پستی جهت ارسال" rows="3" style="resize:none;"></textarea>
                
                <button class="checkout-btn" onclick="redirectToGateway()" style="background:#2ecc71; margin-top:10px;">🚀 اتصال به درگاه بانکی و پرداخت</button>
                <button onclick="hideCheckoutForm()" style="background:none; border:none; color:#7f8c8d; cursor:pointer; font-size:14px; margin-top:5px;">← بازگشت به سبد خرید</button>
            </div>
        </div>
    </aside>

    <div id="cartOverlay" class="cart-overlay"></div>

    <script src="script.js"></script>
</body>
</html>
