<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محصولات جادویی | المنتال</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="logo">Elemental</div>
        <nav class="nav">
            <a href="index.html">خانه</a>
            <a href="products.html" class="active">محصولات</a>
        </nav>
        <div class="header-icons">
            <button class="cart-btn" aria-label="سبد خرید">🛒</button>
        </div>
    </header>

    <main style="padding-top: 50px;">
        <h1 id="categoryTitle" style="text-align: center; color: #2c3e50; margin-bottom: 30px; font-weight: 900;">در حال بارگذاری...</h1>

        <section class="products">
            <div id="productsGrid" class="products-grid"></div>
        </section>
    </main>

    <footer class="footer" style="text-align: center; padding: 30px; margin-top: 50px; border-top: 1px solid #eee; color: #7f8c8d;">
        <p>&copy; ۲۰۲۶ فروشگاه المنتال. ساخته شده با عشق 💜</p>
    </footer>

    <aside id="cartPanel" class="cart-panel">
        <div class="cart-header">
            <h2>سبد خرید شما</h2>
            <button class="close-cart">×</button>
        </div>
        
        <div id="cartMainSection">
            <div id="cartItems"></div>
            <div class="cart-footer">
                <div class="total">مجموع: <span id="totalPrice">0</span> تومان</div>
                <button class="checkout-btn" onclick="showCheckoutForm()">💳 رفتن به مرحله پرداخت</button>
            </div>
        </div>

        <div id="checkoutFormSection" style="display: none; padding: 25px; color: #2c3e50;">
            <h3 style="margin-bottom: 20px; color: #ff007f;">📋 مشخصات تحویل‌گیرنده</h3>
            <div style="display:flex; flex-direction:column; gap:15px;">
                <input type="text" id="customerName" placeholder="نام و نام خانوادگی">
                <input type="tel" id="customerPhone" placeholder="شماره موبایل">
                <textarea id="customerAddress" placeholder="آدرس دقیق پستی جهت ارسال" rows="3" style="resize:none;"></textarea>
                
                <button class="checkout-btn" onclick="redirectToGateway()" style="background:#2ecc71; margin-top:10px;">🚀 اتصال به درگاه بانکی و پرداخت</button>
                <button onclick="hideCheckoutForm()" style="background:none; border:none; color:#7f8c8d; cursor:pointer; font-size:14px; margin-top:5px;">← بازگشت به سبد خرید</button>
            </div>
        </div>
    </aside>

    <div id="cartOverlay" class="cart-overlay"></div>

    <script src="script.js"></script>
</body>
</html>
